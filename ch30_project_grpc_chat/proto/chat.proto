// 30장: gRPC 채팅 앱 - Protocol Buffers 정의 파일
//
// 이 파일은 gRPC 채팅 서비스의 메시지와 서비스를 정의합니다.
// 코드 생성 명령:
//   protoc --go_out=. --go-grpc_out=. proto/chat.proto
//
// 필요한 도구:
//   brew install protobuf
//   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
//   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

syntax = "proto3";

// Go 패키지 경로 지정
option go_package = "./proto/chatpb";

package chat;

// === 메시지 정의 ===

// ChatMessage - 채팅 메시지
message ChatMessage {
    string user = 1;        // 발신자 이름
    string content = 2;     // 메시지 내용
    int64 timestamp = 3;    // Unix 타임스탬프 (밀리초)
    MessageType type = 4;   // 메시지 유형
}

// MessageType - 메시지 유형 열거형
enum MessageType {
    NORMAL = 0;     // 일반 메시지
    JOIN = 1;       // 입장 알림
    LEAVE = 2;      // 퇴장 알림
    SYSTEM = 3;     // 시스템 메시지
}

// JoinRequest - 채팅방 입장 요청
message JoinRequest {
    string user = 1;        // 사용자 이름
    string room = 2;        // 채팅방 이름 (빈 문자열이면 기본 방)
}

// JoinResponse - 채팅방 입장 응답
message JoinResponse {
    bool success = 1;       // 입장 성공 여부
    string message = 2;     // 응답 메시지
    int32 user_count = 3;   // 현재 접속자 수
}

// UserListRequest - 사용자 목록 요청
message UserListRequest {
    string room = 1;        // 채팅방 이름
}

// UserListResponse - 사용자 목록 응답
message UserListResponse {
    repeated string users = 1;  // 사용자 이름 목록
    int32 count = 2;            // 총 사용자 수
}

// Empty - 빈 메시지
message Empty {}

// === 서비스 정의 ===

// ChatService - 채팅 서비스
service ChatService {
    // Join - 채팅방에 입장합니다 (단순 RPC)
    rpc Join(JoinRequest) returns (JoinResponse);

    // Leave - 채팅방에서 퇴장합니다 (단순 RPC)
    rpc Leave(JoinRequest) returns (JoinResponse);

    // GetUsers - 접속 중인 사용자 목록을 조회합니다 (단순 RPC)
    rpc GetUsers(UserListRequest) returns (UserListResponse);

    // SendMessage - 메시지를 전송합니다 (단순 RPC)
    rpc SendMessage(ChatMessage) returns (Empty);

    // Subscribe - 메시지를 구독합니다 (서버 스트리밍 RPC)
    // 서버가 새 메시지가 올 때마다 클라이언트에게 스트리밍으로 전달합니다
    rpc Subscribe(JoinRequest) returns (stream ChatMessage);

    // Chat - 양방향 스트리밍 채팅 (양방향 스트리밍 RPC)
    // 클라이언트와 서버가 동시에 메시지를 주고받습니다
    rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
